name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write       # create tags, push CHANGELOG.md
  packages: write       # push to ghcr.io
  issues: write         # semantic-release can comment on issues
  pull-requests: write  # semantic-release can comment on PRs

jobs:
  release:
    name: Semantic release
    runs-on: ubuntu-latest
    outputs:
      new_release_published: ${{ steps.release.outputs.new_release_published }}
      new_release_version: ${{ steps.release.outputs.new_release_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Semantic Release
        id: release
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/changelog
            @semantic-release/git
          semantic_version: 24
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        # Inline .releaserc config via the config file created below
        # semantic-release reads .releaserc.json from the repo root

  docker-build:
    name: Build ${{ matrix.image }} (${{ matrix.platform }})
    needs: release
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        image: [api, web]
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
            platform_tag: amd64
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
            platform_tag: arm64
          - platform: linux/arm/v7
            runner: ubuntu-24.04-arm
            platform_tag: armv7
    env:
      REGISTRY: ghcr.io
      OWNER: benbotsford
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        if: matrix.platform == 'linux/arm/v7'
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push by digest
        id: build
        uses: docker/build-push-action@v6
        with:
          context: apps/${{ matrix.image }}
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=ghcr.io/benbotsford/trivia-${{ matrix.image }},push-by-digest=true,name-canonical=true,push=true
          cache-from: type=gha,scope=${{ matrix.image }}-${{ matrix.platform_tag }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}-${{ matrix.platform_tag }}

      - name: Export digest
        run: |
          mkdir -p /tmp/digests/${{ matrix.image }}
          echo "${{ steps.build.outputs.digest }}" > /tmp/digests/${{ matrix.image }}/${{ matrix.platform_tag }}

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.image }}-${{ matrix.platform_tag }}
          path: /tmp/digests/${{ matrix.image }}/${{ matrix.platform_tag }}
          if-no-files-found: error
          retention-days: 1

  docker-manifest:
    name: Merge manifest (${{ matrix.image }})
    needs: [release, docker-build]
    if: needs.release.outputs.new_release_published == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        image: [api, web]
    env:
      VERSION: ${{ needs.release.outputs.new_release_version }}
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests/${{ matrix.image }}
          pattern: digest-${{ matrix.image }}-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create manifest list and push
        working-directory: /tmp/digests/${{ matrix.image }}
        run: |
          docker buildx imagetools create \
            -t ghcr.io/benbotsford/trivia-${{ matrix.image }}:${{ env.VERSION }} \
            -t ghcr.io/benbotsford/trivia-${{ matrix.image }}:latest \
            $(for f in *; do echo "ghcr.io/benbotsford/trivia-${{ matrix.image }}@$(cat "$f")"; done)

      - name: Inspect image
        run: |
          docker buildx imagetools inspect ghcr.io/benbotsford/trivia-${{ matrix.image }}:${{ env.VERSION }}
